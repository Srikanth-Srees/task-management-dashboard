<div class="card" [ngClass]="'border-' + (task.priority?.toLowerCase() || 'low')">
  <div class="card-top">
    <span class="task-id">#{{ task.id }}</span>
    <span
      class="status-badge"
      [ngClass]="'badge-' + (task.status.toLowerCase() || 'pending').replace(' ', '-')"
    >
      {{ (task.status || 'PENDING') | uppercase }}
    </span>
  </div>

  <h3 class="task-title">{{ task.title }}</h3>

  <div class="card-meta">
    <div class="meta-row">
      <span class="priority-badge" [ngClass]="'prio-' + (task.priority?.toLowerCase() || 'low')">
        <span class="material-icons">flag</span>
        {{ task.priority || 'LOW' | uppercase }}
      </span>
    </div>

    <div class="meta-row assignee-row">
      <div class="avatar" [style.background]="getAvatarColor(task.assignee)">
        {{ getInitials(task.assignee) }}
      </div>
      <span class="assignee-name">{{ task.assignee }}</span>
    </div>

    <div class="meta-row due-row">
      <span class="material-icons">calendar_today</span>
      <span>{{ task.dueDate | date: 'yyyy-MM-dd' }}</span>
    </div>
  </div>
</div>
